<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0b0f19" />
    <title>Panel Fastech</title>
    
    <style>
      /* 1. Giro continuo del radar cuántico */
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      /* 2. Efecto de levitación del robot */
      @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-12px); }
        100% { transform: translateY(0px); }
      }

      /* 3. Brillo de energía pulsante en los ojos */
      @keyframes eyePulse {
        0% { opacity: 0.4; filter: drop-shadow(0 0 1px #06b6d4); }
        100% { opacity: 1; filter: drop-shadow(0 0 6px #06b6d4); }
      }

      /* 4. Intermitencia en el led de la antena */
      @keyframes blink {
        0% { fill: #475569; }
        100% { fill: #38bdf8; }
      }

      /* 5. Combustión del propulsor inferior */
      @keyframes thrust {
        0% { transform: scaleX(0.85) translateY(0px); opacity: 0.7; }
        100% { transform: scaleX(1.15) translateY(1px); opacity: 1; }
      }
    </style>
  </head>
  <body style="margin: 0; padding: 0; background-color: #0b0f19;">
    <noscript>Necesitas activar JavaScript para correr esta app.</noscript>
    <div id="root"></div>
  </body>
</html>
